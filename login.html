<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Prouterd Web Console</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="login-page">
  <main class="login">
    <h1 class="login__title">Process Router</h1>
    <p class="login__subtitle">Web Console</p>

    <div class="login__error" id="login-error" hidden></div>

    <form id="login-form" class="login__form" autocomplete="off">
      <label for="login-url" class="login__label">Daemon URL</label>
      <input id="login-url" name="url" type="url" class="login__input"
             placeholder="http://localhost:8080" required>

      <label for="login-token" class="login__label">Bearer token</label>
      <input id="login-token" name="token" type="password" class="login__input"
             autofocus>

      <button type="submit" class="login__btn" id="login-submit">Sign in</button>
    </form>
  </main>

  <script>
    // POST /v1/login validates the bearer once, the daemon hands us
    // an HttpOnly cookie session. From then on the SPA holds nothing
    // sensitive in JS — every request rides the cookie. Closes the
    // XSS-leak window the old sessionStorage-bearer setup had.
    //
    // Requires the SPA to be served same-origin with the daemon (or
    // behind a same-origin reverse proxy). The daemon's --console-dir
    // flag handles the dev case: `prouterd --console-dir ./prouterd-
    // web` serves both at the same host.
    (function () {
      "use strict";

      const STORAGE_KEY = "prouterd.core";

      let prefill = {};
      try { prefill = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || "{}"); }
      catch (e) {}

      const urlEl   = document.getElementById("login-url");
      const tokenEl = document.getElementById("login-token");
      const errEl   = document.getElementById("login-error");
      const submit  = document.getElementById("login-submit");

      // Default the URL to the page's own origin so same-origin
      // deploys (the canonical mode) just work without typing.
      urlEl.value = prefill.url || window.location.origin;

      document.getElementById("login-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        errEl.hidden = true;
        const url   = urlEl.value.replace(/\/+$/, "");
        const token = tokenEl.value;
        if (!url) { fail("Daemon URL is required"); return; }

        submit.disabled = true;
        submit.textContent = "Signing in…";
        try {
          const res = await fetch(url + "/v1/login", {
            method: "POST",
            credentials: "include",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ token: token })
          });
          if (res.status === 401) { fail("Invalid token"); return; }
          if (res.status !== 200 && res.status !== 204) {
            const text = await res.text().catch(function () { return ""; });
            fail("HTTP " + res.status + (text ? ": " + text : ""));
            return;
          }

          // Persist only the daemon URL — the cookie is HttpOnly and
          // owned by the browser. JS never sees it again.
          sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ url: url }));
          const next = new URLSearchParams(window.location.search).get("next") || "index.html";
          window.location.href = next;
        } catch (err) {
          // Network error: server unreachable, or cross-origin without
          // CORS-with-credentials. Real fix: serve SPA same-origin.
          fail("Cannot reach daemon: " + err.message);
        } finally {
          submit.disabled = false;
          submit.textContent = "Sign in";
        }
      });

      function fail(msg) { errEl.textContent = msg; errEl.hidden = false; }
    })();
  </script>
</body>
</html>
