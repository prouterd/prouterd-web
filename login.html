<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Prouterd Web Console</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body class="login-page">
  <main class="login">
    <h1 class="login__title">Process Router</h1>
    <p class="login__subtitle">Web Console</p>

    <div class="login__error" id="login-error" hidden></div>

    <form id="login-form" class="login__form" autocomplete="off">
      <label for="login-url" class="login__label">Daemon URL</label>
      <input id="login-url" name="url" type="url" class="login__input"
             placeholder="http://localhost:9000" required>

      <label for="login-token" class="login__label">Bearer token</label>
      <input id="login-token" name="token" type="password" class="login__input"
             autofocus>

      <button type="submit" class="login__btn" id="login-submit">Sign in</button>
    </form>
  </main>

  <script>
    // Validates the daemon URL + bearer by opening a WS to /v1/events
    // with ?token=... and issuing one `status` RPC call. If the WS opens
    // and the call replies, creds are good. We close the WS immediately
    // and persist the creds before navigating to index.html.
    (function () {
      "use strict";

      const STORAGE_KEY = "prouterd.core";
      const HANDSHAKE_TIMEOUT_MS = 5000;
      const CALL_TIMEOUT_MS      = 5000;

      let prefill = {};
      try { prefill = JSON.parse(sessionStorage.getItem(STORAGE_KEY) || "{}"); }
      catch (e) {}

      const urlEl   = document.getElementById("login-url");
      const tokenEl = document.getElementById("login-token");
      const errEl   = document.getElementById("login-error");
      const submit  = document.getElementById("login-submit");
      urlEl.value   = prefill.url   || "";
      tokenEl.value = prefill.token || "";

      document.getElementById("login-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        errEl.hidden = true;
        const url   = urlEl.value.replace(/\/+$/, "");
        const token = tokenEl.value;
        if (!url) { fail("Daemon URL is required"); return; }

        submit.disabled = true;
        submit.textContent = "Signing in…";
        try {
          await verify(url, token);
          sessionStorage.setItem(STORAGE_KEY, JSON.stringify({ url: url, token: token }));
          const next = new URLSearchParams(window.location.search).get("next") || "index.html";
          window.location.href = next;
        } catch (err) {
          fail(err.message);
        } finally {
          submit.disabled = false;
          submit.textContent = "Sign in";
        }
      });

      function verify(url, token) {
        return new Promise(function (resolve, reject) {
          let wsUrl = url.replace(/^http/, "ws") + "/v1/events";
          if (token) wsUrl += "?token=" + encodeURIComponent(token);

          let ws;
          try { ws = new WebSocket(wsUrl); }
          catch (e) { return reject(new Error("Cannot reach daemon: " + e.message)); }

          let settled = false;
          const finish = function (err, val) {
            if (settled) return;
            settled = true;
            try { ws.close(); } catch (e) {}
            err ? reject(err) : resolve(val);
          };

          const handshakeTimer = setTimeout(function () {
            finish(new Error("Daemon did not respond within " + (HANDSHAKE_TIMEOUT_MS / 1000) + "s"));
          }, HANDSHAKE_TIMEOUT_MS);

          let callTimer = null;

          ws.addEventListener("open", function () {
            clearTimeout(handshakeTimer);
            const id = "login_" + Date.now();
            ws.send(JSON.stringify({ id: id, type: "call", payload: { method: "status", args: {} } }));
            callTimer = setTimeout(function () {
              finish(new Error("Daemon accepted the connection but did not reply to status"));
            }, CALL_TIMEOUT_MS);
          });

          ws.addEventListener("message", function (e) {
            let msg;
            try { msg = JSON.parse(e.data); } catch (err) { return; }
            if (!msg.reply_to) return;     // ignore unrelated frames
            if (callTimer) clearTimeout(callTimer);
            if (msg.type === "reply") return finish(null, msg.payload);
            if (msg.type === "error") {
              const p = msg.payload || {};
              if (p.code === "unauthorized") return finish(new Error("Invalid token"));
              return finish(new Error(p.message || "rpc error"));
            }
            finish(new Error("Unexpected reply frame: " + msg.type));
          });

          ws.addEventListener("close", function () {
            if (settled) return;
            // Closed before we got a reply — most likely auth rejected
            // at handshake (server closes before sending anything).
            finish(new Error("Daemon refused the connection (token rejected?)"));
          });

          ws.addEventListener("error", function () { /* close will follow */ });
        });
      }

      function fail(msg) { errEl.textContent = msg; errEl.hidden = false; }
    })();
  </script>
</body>
</html>
